trade_id: SWAP_DEBUG_001
description: "Hand-debug trade. 500M, pay floating / receive 5.41% fixed, monthly periods rolling on the 8th, 2 BD pay delay (weekends skipped), fixings 2026-03-09 to 2035-10-08."

notional: 500000000
pay_fixed: false               # we pay floating, receive fixed
fixed_rate: 0.0541

start_date: 2026-03-09         # first accrual day (effective)
maturity_date: 2035-11-08      # last accrual end; principal + final coupon settle at maturity + 2 BD

fixed_frequency: 1M            # monthly periods, rolling on the 8th (ModFollowing skip-weekend)
fixed_daycount: 30/360        # fixed coupon: N * R * days / 360
floating_daycount: ACT/360     # OIS compounding uses days/360
floating_spread: 0.0

fixing_calendar: NY_FED
payment_calendar: NY_FED
business_day_convention: ModifiedFollowing

payment_delay_bdays: 2         # cash settles 2 NY-Fed business days after period end (weekends skipped)
lockout_bdays: 0
