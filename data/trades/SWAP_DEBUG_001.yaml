trade_id: SWAP_DEBUG_001
description: "Hand-debug trade. 500M, pay floating / receive 5.41% fixed, monthly periods rolling on the 8th, 2 BD pay delay (weekends skipped), fixings 2026-03-09 to 2035-10-08."

notional: 500000000
oracle_entity_code: "1000"     # keys into data/entity/Entity_Reference_Report.csv for CCID
pay_fixed: false               # we pay floating, receive fixed
fixed_rate: 0.0541

start_date: 2026-03-09         # first accrual day (effective)
maturity_date: 2035-11-08      # last accrual end; principal + final coupon settle at maturity + 2 BD

fixed_frequency: 1M            # monthly periods, rolling on the 8th (backward from maturity)
fixed_daycount: 30/360         # fixed coupon: N * R * days / 360
floating_daycount: ACT/360     # OIS compounding uses days/360
floating_spread: 0.0

# Principal payback at maturity on both legs (PV-neutral for the swap holder; visibility only)
fixed_principal_exchange: end
floating_principal_exchange: end

# Conventions (per-leg, Bloomberg vocabulary). Roll convention 'backward'
# preserves the original "rolling on the 8th" (generated back from maturity).
fixed_bus_day_adj: ModifiedFollowing
fixed_roll_convention: backward
fixed_payment_delay_bdays: 2   # cash settles 2 NY-Fed business days after period end

floating_bus_day_adj: ModifiedFollowing
floating_roll_convention: backward
floating_payment_delay_bdays: 2
